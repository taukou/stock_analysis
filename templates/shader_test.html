<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shader Test</title>
  <style>
    html,body{height:100%;margin:0;background:#000;color:#fff;font-family:Segoe UI, Roboto, 'Noto Sans TC', sans-serif}
    #shader-root{position:fixed;inset:0;z-index:0;pointer-events:none}
    .overlay{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
    h1{font-size:64px;margin:0 0 8px}
    p{opacity:0.9}
    a.btn{display:inline-block;margin-top:16px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;text-decoration:none}
  </style>
</head>
<body>
  <div id="shader-root" aria-hidden="true"></div>
  <div class="overlay">
    <h1>ShaderGradient Test</h1>
    <p>Using the provided customize URL — background should animate.</p>
    <a class="btn" href="/">Back</a>
  </div>

  <script type="module">
  (async ()=>{
    try{
      const React = (await import('https://esm.sh/react@19')).default;
      const { createRoot } = await import('https://esm.sh/react-dom@19/client');
      const shader = await import('https://esm.sh/@shadergradient/react');
      const { ShaderGradientCanvas, ShaderGradient } = shader;

      const url = "https://shadergradient.co/customize?animate=on&axesHelper=off&bgColor1=%23000000&bgColor2=%23000000&brightness=0.8&cAzimuthAngle=270&cDistance=0.5&cPolarAngle=180&cameraZoom=15.1&color1=%2373bfc4&color2=%23ff810a&color3=%238da0ce&destination=onCanvas&embedMode=off&envPreset=city&format=gif&fov=45&frameRate=10&gizmoHelper=hide&grain=on&lightType=env&pixelDensity=1&positionX=-0.1&positionY=0&positionZ=0&range=disabled&rangeEnd=40&rangeStart=0&reflection=0.4&rotationX=0&rotationY=130&rotationZ=70&shader=defaults&type=sphere&uAmplitude=3.2&uDensity=0.8&uFrequency=5.5&uSpeed=0.3&uStrength=0.3&uTime=0&wireframe=false";

      function App(){
        return React.createElement(ShaderGradientCanvas, { style:{position:'absolute',inset:0}, pixelDensity:1, fov:45 },
          React.createElement(ShaderGradient, { control: 'query', urlString: url })
        );
      }

      const mount = document.getElementById('shader-root');
      if(mount){
        const root = createRoot(mount);
        root.render(React.createElement(App));
        requestAnimationFrame(()=>{
          mount.style.position = 'fixed';
          mount.style.inset = '0';
          mount.style.width = '100%';
          mount.style.height = '100%';
          mount.style.zIndex = '0';
          mount.style.pointerEvents = 'none';
        });
      }
    }catch(err){
      console.warn('ShaderGradient CDN load failed', err);
    }
  })();
  </script>
</body>
</html>
